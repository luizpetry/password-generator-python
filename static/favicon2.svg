<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- Fundo escuro com cantos arredondados -->
  <rect width="512" height="512" rx="100" fill="#0d1117"/>

  <!-- Escudo sólido ciano — grosso e bold para ser visível em 16px -->
  <path d="M256 72 L388 122 L388 268 Q388 362 256 440 Q124 362 124 268 L124 122 Z"
        fill="url(#g)"/>

  <!-- Corpo do cadeado (branco opaco dentro do escudo) -->
