  <!-- Arco do cadeado -->
  <path d="M222 264 L222 234 Q222 196 256 196 Q290 196 290 234 L290 264"
        fill="none" stroke="#0d1117" stroke-width="22" stroke-linecap="round"/>

  <!-- Buraco da fechadura -->
  <circle cx="256" cy="294" r="14" fill="url(#g)"/>
  <rect x="249" y="304" width="14" height="20" rx="5" fill="url(#g)"/>
